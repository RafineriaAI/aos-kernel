name: AOS Kernel CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # Pinned from actions/checkout@v4 on 2026-07-03.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Pinned from actions/setup-python@v5 on 2026-07-03.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      # Pinned from leanprover/lean-action@v1 on 2026-07-03.
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
      - name: Install
        run: python -m pip install -e .[dev]
      - name: Validate
        run: python tools/run_validation_gate.py --standard --skip-install