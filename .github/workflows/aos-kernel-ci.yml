name: AOS Kernel CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # Pinned from actions/checkout@v4 on 2026-07-03.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      # Pinned from actions/setup-python@v5 on 2026-07-03.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      # Pinned from leanprover/lean-action@v1 on 2026-07-03.
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
      - name: Install
        run: python -m pip install -e .[dev]
      - name: Validate
        run: python tools/run_validation_gate.py --standard --skip-install