name: AOS Kernel CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: leanprover/lean-action@v1
      - name: Install
        run: python -m pip install -e .[dev]
      - name: Validate
        run: python tools/run_validation_gate.py --standard --skip-install