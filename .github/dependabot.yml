# Scope-locked maintenance (see docs/MAINTENANCE_POLICY.md): routine version
# bumps are disabled (open-pull-requests-limit: 0) to keep the frozen public
# kernel quiet. Dependabot security updates stay enabled at the repository
# level, so security patches still open pull requests.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    commit-message:
      prefix: "deps(actions)"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:15"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    commit-message:
      prefix: "deps(python)"